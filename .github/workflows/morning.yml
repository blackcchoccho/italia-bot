name: "🌅 이탈리아 회화 - 오전 5시 (새 표현)"

on:
  schedule:
    # 매일 오전 5시 00분 KST = 20:00 UTC (전날)
    - cron: "0 20 * * *"
  workflow_dispatch:   # 수동 실행 버튼 (테스트용)

jobs:
  send-morning:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: 코드 체크아웃
        uses: actions/checkout@v4

      - name: Python 3.11 설정
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: 의존성 설치
        run: pip install requests pytz

      - name: 🌅 오전 새 표현 전송
        run: python bot.py morning
        env:
          BOT_TOKEN: ${{ secrets.BOT_TOKEN }}
          CHAT_ID:   ${{ secrets.CHAT_ID }}
          DEPARTURE_YEAR: "2026"
